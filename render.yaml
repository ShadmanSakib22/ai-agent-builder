services:
  - type: web
    name: my-fastapi-backend
    runtime: python
    plan: free # Use 'free' for the free tier
    rootDir: backend # This is key for your structure
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true # Enables Auto-Deploy on every push to your main branch
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Set your preferred version

# This section enables the PR Previews you saw in the dashboard
previews:
  generation: automatic
